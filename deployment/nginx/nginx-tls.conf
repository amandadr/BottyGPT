# TLS reverse proxy for assistant.mannyroy.com and assistant-api.mannyroy.com
# Certs from Let's Encrypt (certbot). Mount cert dir at /etc/letsencrypt.
# Resolver so upstream hostnames are re-resolved (avoids 502 after backend restart).
resolver 127.0.0.11 valid=10s ipv6=off;

# ACME challenge for certbot renewal (must be served over HTTP)
server {
    listen 80;
    server_name assistant.mannyroy.com assistant-api.mannyroy.com;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend: assistant.mannyroy.com
server {
    listen 443 ssl http2;
    server_name assistant.mannyroy.com;

    ssl_certificate     /etc/letsencrypt/live/assistant.mannyroy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/assistant.mannyroy.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        set $fe frontend:80;
        proxy_pass http://$fe;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API: assistant-api.mannyroy.com (no port in URL; proxy to backend:7091)
server {
    listen 443 ssl http2;
    server_name assistant-api.mannyroy.com;

    ssl_certificate     /etc/letsencrypt/live/assistant.mannyroy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/assistant.mannyroy.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        set $be backend:7091;
        proxy_pass http://$be;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
