# DocsGPT stack for GCP VM: frontend + backend + worker + infra. All on VM.
# Use with: docker compose -f deployment/docker-compose.gcp.yaml --env-file .env up -d
# Ensure .env has: VECTOR_STORE=qdrant, QDRANT_URL=http://qdrant:6333, IMAGE_TAG=<sha>.

name: docsgpt-oss
x-logging-defaults: &logging_defaults
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  frontend:
    image: northamerica-northeast1-docker.pkg.dev/manny-roy-consulting/docsgpt-repo/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *logging_defaults
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    image: northamerica-northeast1-docker.pkg.dev/manny-roy-consulting/docsgpt-repo/backend:${IMAGE_TAG:-latest}
    user: "0"
    restart: unless-stopped
    logging: *logging_defaults
    env_file:
      - ./.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - MONGO_URI=mongodb://mongo:27017/docsgpt
      - CACHE_REDIS_URL=redis://redis:6379/2
      - QDRANT_URL=http://qdrant:6333
      - DOCSGPT_SERVICE_NAME=docsgpt-backend
    ports:
      - "7091:7091"
    volumes:
      - docsgpt-indexes:/app/indexes
      - docsgpt-inputs:/app/inputs
      - docsgpt-vectors:/app/vectors
      - ./.env:/app/.env:ro 
    healthcheck:
      test: ["CMD", "python", "-m", "application.healthcheck", "--target", "backend"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker:
    image: northamerica-northeast1-docker.pkg.dev/manny-roy-consulting/docsgpt-repo/backend:${IMAGE_TAG:-latest}
    user: "0"
    command: celery -A application.app.celery worker -l INFO -B
    restart: unless-stopped
    logging: *logging_defaults
    env_file:
      - ./.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - MONGO_URI=mongodb://mongo:27017/docsgpt
      - API_URL=http://backend:7091
      - CACHE_REDIS_URL=redis://redis:6379/2
      - QDRANT_URL=http://qdrant:6333
      - DOCSGPT_SERVICE_NAME=docsgpt-worker
    volumes:
      - docsgpt-indexes:/app/indexes
      - docsgpt-inputs:/app/inputs
      - docsgpt-vectors:/app/vectors
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "python", "-m", "application.healthcheck", "--target", "worker"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    logging: *logging_defaults
    healthcheck:
      # Qdrant image has no curl/wget; use /readyz and bash TCP (see qdrant/qdrant#4250)
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"HTTP/1.1 200\" <&3'"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

  redis:
    image: redis:6-alpine
    restart: unless-stopped
    logging: *logging_defaults
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 8
      start_period: 10s

  mongo:
    image: mongo:6
    restart: unless-stopped
    logging: *logging_defaults
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_container:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  mongodb_data_container:
  qdrant_data:
  docsgpt-indexes:
  docsgpt-inputs:
  docsgpt-vectors:
