# Push-to-Deploy: build backend + frontend, push to Artifact Registry, deploy full stack (frontend + backend + worker + infra) on VM.
# Requires: Secrets GCP_SA_KEY, VM_IP, VM_USER, SSH_PRIVATE_KEY. Optional: VITE_API_HOST, VITE_BASE_URL. See docs/GH-ACTIONS-DEPLOY.md.
# Manual run: optionally set "Reuse image tag" to skip build and deploy VM only.

name: Deploy to GCP (VM)

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "google-cloud-sdk/**"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Reuse image tag (skip build); e.g. 9fe4e5c77af5739962c9a0e1acaa2dae1d01ce41"
        required: false

env:
  PROJECT_ID: manny-roy-consulting
  REGION: northamerica-northeast1
  REPO_NAME: docsgpt-repo
  VM_NAME: docsgpt-prod
  VM_ZONE: northamerica-northeast1-a
  DEPLOY_PATH: /opt/docsgpt
  COMPOSE_FILE: docker-compose.gcp.yaml

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.out.outputs.tag }}
    steps:
      - id: out
        run: echo "tag=${{ github.event.inputs.image_tag || github.sha }}" >> $GITHUB_OUTPUT

  build-and-push:
    needs: resolve-tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    env:
      RESOLVED_TAG: ${{ needs.resolve-tag.outputs.tag }}
    steps:
      - name: Set image tag (reuse or build)
        id: meta
        run: echo "image_tag=${{ env.RESOLVED_TAG }}" >> $GITHUB_OUTPUT

      - name: Checkout
        if: env.RESOLVED_TAG == github.sha
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        if: env.RESOLVED_TAG == github.sha
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: env.RESOLVED_TAG == github.sha
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Docker auth (Artifact Registry)
        if: env.RESOLVED_TAG == github.sha
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend
        if: env.RESOLVED_TAG == github.sha
        run: |
          docker buildx create --use --name deploy-builder || true
          docker buildx build \
            --platform linux/amd64 \
            -f application/Dockerfile \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${{ github.sha }} \
            --push \
            application

      - name: Build and push frontend
        if: env.RESOLVED_TAG == github.sha
        env:
          VITE_API_HOST: ${{ secrets.VITE_API_HOST }}
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f frontend/Dockerfile.production \
            --build-arg VITE_API_HOST="${VITE_API_HOST:-https://assistant-api.mannyroy.com}" \
            --build-arg VITE_BASE_URL="${VITE_BASE_URL:-https://assistant.mannyroy.com}" \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:${{ github.sha }} \
            --push \
            frontend

  deploy:
    needs: [resolve-tag, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}
            if [ "${{ secrets.USE_SECRET_MANAGER }}" = "true" ]; then
              gcloud secrets versions access latest --secret=docsgpt-env --project=${{ env.PROJECT_ID }} > .env
              chmod 600 .env
            fi
            IMAGE_TAG="${{ needs.resolve-tag.outputs.tag }}"
            if grep -q '^IMAGE_TAG=' .env 2>/dev/null; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env
            else
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            fi
            # Log in to Artifact Registry as root using VM metadata (daemon uses root's config)
            REGISTRY="${{ env.REGION }}-docker.pkg.dev"
            TOKEN=$(curl -sS -f -H "Metadata-Flavor: Google" "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token")
            ACCESS=$(echo "$TOKEN" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
            echo "$ACCESS" > /tmp/docker-token.$$ && sudo docker login -u oauth2accesstoken --password-stdin "https://${REGISTRY}" < /tmp/docker-token.$$ && rm -f /tmp/docker-token.$$
            sudo REGISTRY="${REGISTRY}" python3 -c "
            import json, os
            path = '/root/.docker/config.json'
            reg = os.environ.get('REGISTRY', 'docker.pkg.dev')
            with open(path) as f: c = json.load(f)
            for k in list(c.get('credHelpers', {})):
                if reg in k or 'docker.pkg.dev' in k: del c['credHelpers'][k]
            if c.get('credHelpers') == {}: c.pop('credHelpers', None)
            with open(path, 'w') as f: json.dump(c, f, indent=2)
            "
            sudo systemctl restart docker || true
            sleep 3
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            COMPOSE_FILE="${{ env.COMPOSE_FILE }}"
            if [ "${{ secrets.USE_TLS }}" = "true" ]; then COMPOSE_FILE="docker-compose.gcp-tls.yaml"; fi
            sudo docker compose -f "${DEPLOY_PATH}/${COMPOSE_FILE}" --env-file "${DEPLOY_PATH}/.env" pull
            sudo docker compose -f "${DEPLOY_PATH}/${COMPOSE_FILE}" --env-file "${DEPLOY_PATH}/.env" up -d
