name: Backend preflight gates

on:
  pull_request:
    paths-ignore:
      - "google-cloud-sdk/**"
  push:
    branches:
      - main
    paths-ignore:
      - "google-cloud-sdk/**"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  MAX_BACKEND_IMAGE_BYTES: "8000000000"

jobs:
  dependency_and_tests:
    name: Dependency checks and backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r application/requirements.txt
          pip install -r tests/requirements.txt

      - name: Validate dependency graph
        run: |
          pip check

      - name: Run backend smoke tests
        run: |
          python -m pytest tests/test_app.py tests/test_celery.py -q

  backend_image_size_guardrail:
    name: Backend image size guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -f application/Dockerfile -t docsgpt-backend:preflight application

      - name: Enforce image size threshold
        run: |
          IMAGE_SIZE=$(docker image inspect docsgpt-backend:preflight --format='{{.Size}}')
          echo "Backend image size bytes: ${IMAGE_SIZE}"
          if [ "${IMAGE_SIZE}" -gt "${MAX_BACKEND_IMAGE_BYTES}" ]; then
            echo "Backend image is too large (${IMAGE_SIZE} > ${MAX_BACKEND_IMAGE_BYTES})"
            exit 1
          fi

  compose_connectivity:
    name: Compose connectivity smoke
    needs:
      - dependency_and_tests
      - backend_image_size_guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start preflight stack
        run: |
          docker compose -f deployment/docker-compose.preflight.yaml up -d --build --wait

      - name: Verify backend health endpoints
        run: |
          curl --fail --silent http://localhost:7091/api/health >/dev/null
          curl --fail --silent http://localhost:7091/api/ready >/dev/null

      - name: Verify dependency checks from backend container
        run: |
          docker compose -f deployment/docker-compose.preflight.yaml exec -T backend python -m application.healthcheck --target dependencies

      - name: Tear down preflight stack
        if: always()
        run: |
          docker compose -f deployment/docker-compose.preflight.yaml down -v --remove-orphans
